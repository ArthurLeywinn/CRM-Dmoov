services:
  db:
    image: postgres:16-alpine
    container_name: dmoov-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dmoov
      POSTGRES_PASSWORD: dmoov_dev_password
      POSTGRES_DB: dmoov_crm
    ports:
      - "5432:5432"
    volumes:
      - dmoov_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmoov -d dmoov_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Se agregan en fases siguientes:
  #
  # web:     Next.js (panel + webhook de WhatsApp)
  # worker:  consumidor de pg-boss (timers, reactivación, SLA)
  # ----------------------------------------------------------------------------

volumes:
  dmoov_pgdata:
